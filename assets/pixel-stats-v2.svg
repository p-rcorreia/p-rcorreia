<svg width="560" height="230" viewBox="0 0 560 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0d1117; }
    .panel { fill: #161b22; stroke: #58a6ff; stroke-width: 3; }
    .grid { stroke: #263246; stroke-width: 1; opacity: .65; }
    .title { fill: #79c0ff; font: 700 20px monospace; }
    .label { fill: #c9d1d9; font: 600 14px monospace; }
    .muted { fill: #8b949e; font: 13px monospace; }
    .accent { fill: #39d353; font: 700 14px monospace; }
    .pink { fill: #ff7b72; }
    .blue { fill: #58a6ff; }
    .green { fill: #39d353; }
    .yellow { fill: #d29922; }
    .pixel { shape-rendering: crispEdges; }
    .blink { animation: blink 1.1s steps(2, start) infinite; }
    .float { animation: float 2s ease-in-out infinite; }
    .scan { animation: scan 3.2s linear infinite; opacity: .3; }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
    @keyframes scan { from { transform: translateY(-230px); } to { transform: translateY(230px); } }
  </style>

  <rect class="bg" width="560" height="230"/>
  <path class="grid" d="M20 40H540M20 80H540M20 120H540M20 160H540M20 200H540M80 20V210M160 20V210M240 20V210M320 20V210M400 20V210M480 20V210"/>
  <rect class="panel pixel" x="18" y="18" width="524" height="194" rx="8"/>
  <rect class="scan" x="18" y="18" width="524" height="22" fill="#58a6ff"/>

  <text x="34" y="52" class="title">terminal@github:~$ status</text>
  <text x="34" y="86" class="label">commits</text>
  <text x="156" y="86" class="accent">loading study timeline</text>
  <text x="34" y="116" class="label">repos</text>
  <text x="156" y="116" class="accent">building foundations</text>
  <text x="34" y="146" class="label">focus</text>
  <text x="156" y="146" class="accent">java · spring · design</text>
  <text x="34" y="178" class="muted">stats warming up</text>
  <text x="176" y="178" class="accent blink">█</text>

  <g class="float pixel">
    <rect x="432" y="92" width="18" height="6" fill="#f0f6fc"/>
    <rect x="426" y="98" width="30" height="6" fill="#f0f6fc"/>
    <rect x="420" y="104" width="42" height="24" fill="#24292f"/>
    <rect x="426" y="104" width="30" height="18" fill="#24292f"/>
    <rect x="432" y="110" width="6" height="6" fill="#0d1117"/>
    <rect x="450" y="110" width="6" height="6" fill="#0d1117"/>
    <rect x="438" y="118" width="12" height="6" fill="#d29922"/>
    <rect x="426" y="128" width="12" height="6" fill="#d29922"/>
    <rect x="450" y="128" width="12" height="6" fill="#d29922"/>
    <rect x="414" y="110" width="6" height="14" class="blue"/>
    <rect x="462" y="110" width="6" height="14" class="blue"/>
  </g>

  <rect x="474" y="34" width="14" height="14" class="pink pixel"/>
  <rect x="496" y="34" width="14" height="14" class="yellow pixel"/>
  <rect x="518" y="34" width="14" height="14" class="green pixel"/>
</svg>
