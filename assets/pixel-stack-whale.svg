<svg width="560" height="230" viewBox="0 0 560 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0d1117; }
    .panel { fill: #161b22; stroke: #39d353; stroke-width: 3; }
    .grid { stroke: #263246; stroke-width: 1; opacity: .65; }
    .title { fill: #7ee787; font: 700 20px monospace; }
    .label { fill: #c9d1d9; font: 600 14px monospace; }
    .muted { fill: #8b949e; font: 13px monospace; }
    .bar-bg { fill: #30363d; }
    .java { fill: #f78166; }
    .spring { fill: #56d364; }
    .sql { fill: #79c0ff; }
    .vue { fill: #3fb950; }
    .pixel { shape-rendering: crispEdges; }
    .grow-spring { animation: growSpring 2.8s ease-in-out infinite; transform-origin: 78px 116px; }
    .grow-sql { animation: growSql 2.8s ease-in-out infinite; transform-origin: 78px 150px; }
    .grow-vue { animation: growVue 2.8s ease-in-out infinite; transform-origin: 78px 184px; }
    @keyframes growSpring { 0%,100% { transform: scaleX(.45); } 50% { transform: scaleX(.82); } }
    @keyframes growSql { 0%,100% { transform: scaleX(.35); } 50% { transform: scaleX(.68); } }
    @keyframes growVue { 0%,100% { transform: scaleX(.25); } 50% { transform: scaleX(.52); } }
  </style>

  <rect class="bg" width="560" height="230"/>
  <path class="grid" d="M20 40H540M20 80H540M20 120H540M20 160H540M20 200H540M80 20V210M160 20V210M240 20V210M320 20V210M400 20V210M480 20V210"/>
  <rect class="panel pixel" x="18" y="18" width="524" height="194" rx="8"/>

  <text x="34" y="52" class="title">stack.exe --preview</text>

  <text x="34" y="88" class="label">Java</text>
  <rect x="78" y="76" width="360" height="16" class="bar-bg pixel"/>
  <rect x="78" y="76" width="360" height="16" class="java pixel"/>

  <text x="34" y="122" class="label">Spring</text>
  <rect x="104" y="110" width="334" height="16" class="bar-bg pixel"/>
  <rect x="104" y="110" width="334" height="16" class="spring pixel grow-spring"/>

  <text x="34" y="156" class="label">SQL</text>
  <rect x="78" y="144" width="360" height="16" class="bar-bg pixel"/>
  <rect x="78" y="144" width="360" height="16" class="sql pixel grow-sql"/>

  <text x="34" y="190" class="label">Vue</text>
  <rect x="78" y="178" width="360" height="16" class="bar-bg pixel"/>
  <rect x="78" y="178" width="360" height="16" class="vue pixel grow-vue"/>

  <text x="452" y="88" class="muted">100%</text>
  <text x="452" y="122" class="muted">building</text>
  <text x="452" y="156" class="muted">modeling</text>
  <text x="452" y="190" class="muted">integrating</text>

</svg>
